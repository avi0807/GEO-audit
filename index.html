<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GEO Audit — Villion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #00ffa3;
      --accent2: #7b61ff;
      --warn: #ff6b6b;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --code-bg: #0d0d1a;
      --radius: 10px;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Grid noise overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,163,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,163,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 48px;
    }

    .logo-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--font-head);
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      font-style: italic;
    }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
      align-items: stretch;
    }

    .url-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--muted); }
    .url-input:focus { border-color: var(--accent); }

    .audit-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 13px;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .audit-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .audit-btn:active { transform: translateY(0); }
    .audit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Status / loader ── */
    .status-bar {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      margin-bottom: 24px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-bar.loading { border-color: var(--accent2); color: var(--accent2); }
    .status-bar.error   { border-color: var(--warn);   color: var(--warn);   }
    .status-bar.success { border-color: var(--accent);  color: var(--accent);  }

    .spinner {
      width: 14px; height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results grid ── */
    .results { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-label {
      font-family: var(--font-head);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .card-badge {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(0,255,163,0.1);
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .card-body { padding: 20px; }

    /* ── Score row ── */
    .scores-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .score-item { display: flex; flex-direction: column; gap: 8px; }

    .score-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .score-name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    .score-val {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
    }

    .score-val.high  { color: var(--accent); }
    .score-val.mid   { color: #ffd700; }
    .score-val.low   { color: var(--warn); }

    .score-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .fill-high { background: var(--accent); }
    .fill-mid  { background: #ffd700; }
    .fill-low  { background: var(--warn); }

    /* ── Meta table ── */
    .meta-table { display: flex; flex-direction: column; gap: 12px; }

    .meta-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      align-items: start;
    }

    .meta-key { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; padding-top: 1px; }
    .meta-val { color: var(--text); line-height: 1.5; word-break: break-word; }

    /* ── Headings list ── */
    .headings-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .headings-list li {
      padding: 8px 12px;
      background: var(--code-bg);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
      border-left: 2px solid var(--accent2);
    }

    /* ── Images row ── */
    .images-strip { display: flex; gap: 10px; flex-wrap: wrap; }

    .img-thumb {
      width: 80px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--code-bg);
    }

    /* ── Code block ── */
    .code-block {
      background: var(--code-bg);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.7;
      color: #a8d8b0;
      white-space: pre;
      font-family: var(--font-mono);
    }

    /* ── Insights ── */
    .insights-list { display: flex; flex-direction: column; gap: 10px; }

    .insight-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px;
      background: var(--code-bg);
      border-radius: 8px;
    }

    .insight-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .insight-text { font-size: 13px; line-height: 1.6; color: var(--text); }

    /* ── Reasoning ── */
    .reasoning-text {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
      border-left: 2px solid var(--accent2);
      padding-left: 14px;
    }

    /* ── Schema badge ── */
    .schema-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(123,97,255,0.15);
      border: 1px solid rgba(123,97,255,0.4);
      border-radius: 20px;
      color: var(--accent2);
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 16px;
    }

    /* ── Copy button ── */
    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-left: auto;
      transition: color 0.2s, border-color 0.2s;
    }

    .copy-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Overall score ring ── */
    .overall-ring {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .ring-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .ring-wrap svg { transform: rotate(-90deg); }

    .ring-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
    }

    .ring-info { flex: 1; }
    .ring-title {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .ring-sub { font-size: 12px; color: var(--muted); }

    @media (max-width: 600px) {
      .scores-grid { grid-template-columns: 1fr; }
      .meta-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-block">
      <span class="logo-tag">Villion Inc. · GEO Platform</span>
      <h1>GEO <span>Audit</span></h1>
      <p class="subtitle">AI citation readiness · structured data · schema recommendations</p>
    </div>
  </header>

  <div class="search-row">
    <input
      class="url-input"
      id="urlInput"
      type="url"
      placeholder="https://example.com/page-to-audit"
      autocomplete="off"
    />
    <button class="audit-btn" id="auditBtn" onclick="runAudit()">Run Audit</button>
  </div>

  <div id="statusBar" style="display:none"></div>
  <div id="results"></div>

</div>

<script>
  const API_BASE = "http://localhost:8000";

  function scoreClass(n) {
    return n >= 70 ? 'high' : n >= 40 ? 'mid' : 'low';
  }
  function fillClass(n) {
    return n >= 70 ? 'fill-high' : n >= 40 ? 'fill-mid' : 'fill-low';
  }
  function scoreColor(n) {
    return n >= 70 ? 'var(--accent)' : n >= 40 ? '#ffd700' : 'var(--warn)';
  }

  function setStatus(msg, type) {
    const bar = document.getElementById('statusBar');
    if (!msg) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.className = `status-bar ${type}`;
    bar.innerHTML = type === 'loading'
      ? `<div class="spinner"></div><span>${msg}</span>`
      : `<span>${type === 'error' ? '✗' : '✓'}</span><span>${msg}</span>`;
  }

  function copyCode(id) {
    const el = document.getElementById(id);
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btn = el.previousElementSibling?.querySelector('.copy-btn');
      if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
    });
  }

  async function runAudit() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { setStatus('Please enter a URL.', 'error'); return; }

    const btn = document.getElementById('auditBtn');
    btn.disabled = true;
    document.getElementById('results').innerHTML = '';
    setStatus('Scraping page and running GEO analysis…', 'loading');

    try {
      const res = await fetch(`${API_BASE}/audit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }

      const data = await res.json();
      setStatus('Audit complete — AI citation analysis ready.', 'success');
      renderResults(data);
    } catch (e) {
      setStatus(`Error: ${e.message}`, 'error');
    } finally {
      btn.disabled = false;
    }
  }

  function renderResults(d) {
    const s = d.geo_scores;
    const jsonStr = JSON.stringify(d.json_ld_recommendation, null, 2);

    const html = `
      <div class="results">

        <!-- Overall score -->
        <div class="card">
          <div class="card-header">
            <span class="card-label">GEO Readiness</span>
            <span class="card-badge">${d.detected_schema_type}</span>
          </div>
          <div class="card-body">
            <div class="overall-ring">
              <div class="ring-wrap">
                <svg width="80" height="80" viewBox="0 0 80 80">
                  <circle cx="40" cy="40" r="34" fill="none" stroke="var(--border)" stroke-width="7"/>
                  <circle cx="40" cy="40" r="34" fill="none" stroke="${scoreColor(s.overall)}"
                    stroke-width="7" stroke-linecap="round"
                    stroke-dasharray="${2 * Math.PI * 34}"
                    stroke-dashoffset="${2 * Math.PI * 34 * (1 - s.overall / 100)}"/>
                </svg>
                <div class="ring-label ${scoreClass(s.overall)}" style="color:${scoreColor(s.overall)}">${s.overall}</div>
              </div>
              <div class="ring-info">
                <div class="ring-title">${s.overall >= 70 ? 'Strong GEO foundation' : s.overall >= 40 ? 'Needs improvement' : 'Poor AI citation readiness'}</div>
                <div class="ring-sub">${d.url}</div>
              </div>
            </div>

            <div class="scores-grid">
              ${[
                ['Structured Data', s.structured_data],
                ['Content Clarity', s.content_clarity],
                ['AI Citation Potential', s.ai_citation_potential],
              ].map(([label, val]) => `
                <div class="score-item">
                  <div class="score-top">
                    <span class="score-name">${label}</span>
                    <span class="score-val ${scoreClass(val)}">${val}</span>
                  </div>
                  <div class="score-bar">
                    <div class="score-fill ${fillClass(val)}" style="width:${val}%"></div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>

        <!-- Page metadata -->
        <div class="card">
          <div class="card-header"><span class="card-label">Page Metadata</span></div>
          <div class="card-body">
            <div class="meta-table">
              <div class="meta-row">
                <span class="meta-key">Title</span>
                <span class="meta-val">${d.page_title || '<em style="color:var(--warn)">Missing</em>'}</span>
              </div>
              <div class="meta-row">
                <span class="meta-key">Meta Description</span>
                <span class="meta-val">${d.meta_description || '<em style="color:var(--warn)">Missing — add one for better AI comprehension</em>'}</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Headings -->
        ${d.headings.length ? `
        <div class="card">
          <div class="card-header"><span class="card-label">Detected Headings</span><span class="card-badge">${d.headings.length} found</span></div>
          <div class="card-body">
            <ul class="headings-list">
              ${d.headings.map(h => `<li>${h}</li>`).join('')}
            </ul>
          </div>
        </div>` : ''}

        <!-- Images -->
        ${d.image_urls.length ? `
        <div class="card">
          <div class="card-header"><span class="card-label">Detected Images</span><span class="card-badge">${d.image_urls.length} found</span></div>
          <div class="card-body">
            <div class="images-strip">
              ${d.image_urls.map(u => `<img class="img-thumb" src="${u}" onerror="this.style.display='none'" loading="lazy" />`).join('')}
            </div>
          </div>
        </div>` : ''}

        <!-- JSON-LD recommendation -->
        <div class="card">
          <div class="card-header">
            <span class="card-label">JSON-LD Recommendation</span>
            <button class="copy-btn" onclick="copyCode('jsonCode')">Copy</button>
          </div>
          <div class="card-body">
            <div class="schema-chip">schema.org · ${d.detected_schema_type}</div>
            <pre class="code-block" id="jsonCode">${escapeHtml(jsonStr)}</pre>
          </div>
        </div>

        <!-- AI Reasoning -->
        ${d.llm_reasoning ? `
        <div class="card">
          <div class="card-header"><span class="card-label">AI Reasoning</span></div>
          <div class="card-body">
            <p class="reasoning-text">${d.llm_reasoning}</p>
          </div>
        </div>` : ''}

        <!-- GEO Insights -->
        ${d.geo_insights.length ? `
        <div class="card">
          <div class="card-header"><span class="card-label">GEO Action Items</span></div>
          <div class="card-body">
            <div class="insights-list">
              ${d.geo_insights.map(i => `
                <div class="insight-item">
                  <div class="insight-dot"></div>
                  <span class="insight-text">${i}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>` : ''}

      </div>`;

    document.getElementById('results').innerHTML = html;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Allow Enter key to trigger audit
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') runAudit();
  });
</script>
</body>
</html>
